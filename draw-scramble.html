<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draw Scramble – CubeRhino</title>
  <style>
    :root { --bg:#000000;--card:#06080f;--text:#ffffff;--muted:#7b8fb8;--border:#1a2870;--accent:#2547d0; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 56px;}
    .page{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}
    .brand{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
    h1{font-size:32px;font-weight:900;}
    .subtitle{font-size:15px;color:var(--muted);margin-top:4px;}
    .events-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
    .group-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .tab-row{display:flex;flex-wrap:wrap;gap:6px;}
    .tab-btn{border:none;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;background:#0a0d1a;color:var(--muted);font-family:inherit;transition:background .12s,color .12s;white-space:nowrap;}
    .tab-btn:hover:not(.active){background:#0f1428;}
    .tab-btn.active{background:var(--accent);color:#fff;}
    .tab-btn.unofficial{background:#fff7ed;color:#c2410c;border:1.5px solid #fed7aa;}
    .tab-btn.unofficial.active{background:#f97316;color:#fff;border-color:#f97316;}
    .input-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:10px;}
    .input-card label{font-weight:700;font-size:14px;}
    .input-card textarea{width:100%;min-height:78px;resize:vertical;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:16px;font-family:Consolas,Monaco,monospace;outline:none;background:var(--bg);color:var(--text);}
    .input-card textarea:focus{border-color:var(--accent);background:var(--card);}
    .draw-btn{align-self:flex-start;border:none;border-radius:999px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;font-family:inherit;}
    .draw-btn:hover{opacity:.85;}
    .draw-btn:active{transform:scale(.97);}
    .viz-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:18px;min-height:200px;}
    .face-label{font-weight:700;text-align:center;margin-bottom:10px;font-size:15px;}
    .sticker{border:2px solid rgba(0,0,0,0.18);}
    .err-msg{color:#b91c1c;font-weight:700;font-size:14px;margin-top:6px;}
    .legend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:420px;font-size:13px;}
    .legend-item{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 10px;}
    .swatch{width:17px;height:17px;border-radius:4px;border:1px solid rgba(0,0,0,.22);flex-shrink:0;}
    svg{display:block;}
    .placeholder{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 0;}
    .ph-icon{font-size:40px;}
    .ph-title{font-size:19px;font-weight:800;}
    .ph-sub{font-size:14px;color:var(--muted);max-width:340px;line-height:1.5;}
    .ph-badge{display:inline-block;background:#fff7ed;color:#c2410c;border:1.5px solid #fed7aa;border-radius:999px;padding:3px 12px;font-size:12px;font-weight:700;}
  </style>
</head>
<body>
<div class="page">
  <div>
    <div class="brand">CubeRhino</div>
    <h1>Draw Scramble</h1>
    <p class="subtitle">Pick a puzzle, paste your scramble, and see the top (or front) face.</p>
  </div>
  <div class="events-card">
    <div><div class="group-label">NxN Cubes</div><div class="tab-row" id="tabsNxN"></div></div>
    <div><div class="group-label">Other Official</div><div class="tab-row" id="tabsOther"></div></div>
    <div><div class="group-label">Unofficial</div><div class="tab-row" id="tabsUnofficial"></div></div>
  </div>
  <div class="input-card" id="inputCard">
    <label for="scrambleInput">Scramble</label>
    <textarea id="scrambleInput" spellcheck="false" placeholder="Paste your scramble here…"></textarea>
    <button class="draw-btn" id="drawBtn">Draw Scramble</button>
  </div>
  <div class="viz-card" id="vizCard">
    <div id="vizContainer"></div>
    <div id="legendContainer"></div>
  </div>
</div>
<script>

const _P = new URLSearchParams(location.search);
const IS_EMBED = _P.has('embed');
if (IS_EMBED) {
  document.head.insertAdjacentHTML('beforeend', `<style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;}
    body{background:transparent!important;padding:0!important;min-height:unset!important;display:flex;align-items:center;justify-content:center;}
    .brand,h1,.subtitle,.events-card,.input-card{display:none!important;}
    .page{width:100%;height:100%;gap:0!important;display:flex;flex-direction:column;}
    .viz-card{background:transparent!important;border:none!important;box-shadow:none!important;padding:2px!important;min-height:unset!important;gap:2px!important;flex:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
    #vizContainer{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;}
    #vizContainer svg{max-width:100%;max-height:100%;width:auto;height:auto;display:block;}
    #vizContainer>div{max-width:100%;max-height:100%;}
    .face-label{font-size:11px!important;margin-bottom:2px!important;}
    .err-msg{font-size:11px!important;}
    .legend-grid{display:none!important;}
  </style>`);
}
const COLORS={U:'#ffffff',D:'#ffd500',F:'#009b48',B:'#0046ad',R:'#b71234',L:'#ff5800'};
const COLOR_NAMES={U:'White / U',D:'Yellow / D',F:'Green / F',B:'Blue / B',R:'Red / R',L:'Orange / L'};

// ── NxN CUBE ──────────────────────────────────────────────────────────────────
const NXN_CFG={'222':{N:2,mc:1,c:[-1,1]},'333':{N:3,mc:1,c:[-1,0,1]},'444':{N:4,mc:1.5,c:[-1.5,-0.5,0.5,1.5]},'555':{N:5,mc:2,c:[-2,-1,0,1,2]},'666':{N:6,mc:2.5,c:[-2.5,-1.5,-0.5,0.5,1.5,2.5]},'777':{N:7,mc:3,c:[-3,-2,-1,0,1,2,3]}};
function nxnSolved(c,mc){const cbs=[];for(const x of c)for(const y of c)for(const z of c){if(Math.abs(x)!==mc&&Math.abs(y)!==mc&&Math.abs(z)!==mc)continue;const st=[];if(y===mc)st.push({color:'U',normal:[0,1,0]});if(y===-mc)st.push({color:'D',normal:[0,-1,0]});if(z===mc)st.push({color:'F',normal:[0,0,1]});if(z===-mc)st.push({color:'B',normal:[0,0,-1]});if(x===mc)st.push({color:'R',normal:[1,0,0]});if(x===-mc)st.push({color:'L',normal:[-1,0,0]});cbs.push({pos:[x,y,z],stickers:st});}return cbs;}
function rotV(v,ax,qt){let r=v.slice();const t=((qt%4)+4)%4;for(let i=0;i<t;i++){const[x,y,z]=r;if(ax==='x')r=[x,-z,y];else if(ax==='y')r=[z,y,-x];else r=[-y,x,z];}return r;}
const FI={U:{ax:'y',si:1,t:-1},D:{ax:'y',si:-1,t:1},R:{ax:'x',si:1,t:-1},L:{ax:'x',si:-1,t:1},F:{ax:'z',si:1,t:-1},B:{ax:'z',si:-1,t:1}};
const LC2W={u:'Uw',d:'Dw',r:'Rw',l:'Lw',f:'Fw',b:'Bw'};
function nxnParseTok(tok,N,mc){let base=tok,suf='';if(/[2']$/.test(base)){suf=base.slice(-1).replace('’',"'");base=base.slice(0,-1);}if(LC2W[base])base=LC2W[base];const m=base.match(/^([0-9]+)?([UDRLFB])w?$/);if(!m||!['','2',"'"].includes(suf))throw new Error('Unsupported move: '+tok);const face=m[2],fi=FI[face];const wide=base.includes('w')||Boolean(m[1]);const w=m[1]?Number(m[1]):wide?2:1;if(!fi||w<1||w>N)throw new Error('Unsupported move: '+tok);const layers=[];for(let i=0;i<w;i++)layers.push(fi.si*(mc-i));return{ax:fi.ax,turns:fi.t,layers,suf};}
function nxnApply(text,c,mc,N){const cube=nxnSolved(c,mc);const toks=text.trim().replace(/[''`’]/g,"'").split(/\s+/).filter(Boolean);for(const tok of toks){const info=nxnParseTok(tok,N,mc);const ai={x:0,y:1,z:2}[info.ax];const mult=info.suf==='2'?2:info.suf==="'"?-1:1;const turns=info.turns*mult;for(const cb of cube){if(info.layers.includes(cb.pos[ai])){cb.pos=rotV(cb.pos,info.ax,turns);for(const s of cb.stickers)s.normal=rotV(s.normal,info.ax,turns);}}}return cube;}
function nxnTopFace(cube,c,mc){const out=[];for(const z of c)for(const x of c){const cb=cube.find(cu=>cu.pos.join(',')===`${x},${mc},${z}`);out.push(cb.stickers.find(s=>s.normal.join(',')===`0,1,0`).color);}return out;}
function renderNxN(scramble,cfgKey){const{N,mc,c}=NXN_CFG[cfgKey];let cube,err='';try{cube=nxnApply(scramble||'',c,mc,N);}catch(e){err=e.message;cube=nxnSolved(c,mc);}const stickers=nxnTopFace(cube,c,mc);const szPx=IS_EMBED?Math.max(70,130-(N-3)*12):Math.max(150,270-(N-3)*14);const sz=IS_EMBED?`min(${szPx}px,min(calc(100vw - 4px),calc(100vh - 4px)))`:szPx+'px';const gap=IS_EMBED?Math.max(2,5-(N-3)):Math.max(3,8-(N-3));const br=IS_EMBED?Math.max(3,5-(N-3)):Math.max(5,8-(N-3));const sbr=Math.max(3,8-(N-3));const viz=document.getElementById('vizContainer');viz.innerHTML=`<div style="width:${sz};height:${sz};display:grid;grid-template-columns:repeat(${N},1fr);grid-template-rows:repeat(${N},1fr);gap:${gap}px;background:#18181b;border:${br}px solid #18181b;border-radius:${Math.max(8,16-(N-3)*2)}px">${stickers.map(col=>`<div class="sticker" style="background:${COLORS[col]};border-radius:${sbr}px"></div>`).join('')}</div>${err?`<div class="err-msg">${err}</div>`:''}`; document.getElementById('legendContainer').innerHTML=`<div class="legend-grid">${['U','D','F','B','R','L'].map(f=>`<div class="legend-item"><span class="swatch" style="background:${COLORS[f]}"></span><span>${COLOR_NAMES[f]}</span></div>`).join('')}</div>`;}

// ── SKEWB ──────────────────────────────────────────────────────────────────
function skewbSolve(text){
  function vadd(a,b){return[a[0]+b[0],a[1]+b[1],a[2]+b[2]];}function vsc(a,s){return[a[0]*s,a[1]*s,a[2]*s];}function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}function cross(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}function normalize(a){const n=Math.sqrt(dot(a,a));return[a[0]/n,a[1]/n,a[2]/n];}function rotAround(pt,axis,ang){const u=normalize(axis),cos=Math.cos(ang),sin=Math.sin(ang);return vadd(vadd(vsc(pt,cos),vsc(cross(u,pt),sin)),vsc(u,dot(u,pt)*(1-cos)));}function snap(x){const ch=[-1,0,1];let b=ch[0],bd=Math.abs(x-b);for(const c of ch){const d=Math.abs(x-c);if(d<bd){b=c;bd=d;}}return b;}function snapV(v){return[snap(v[0]),snap(v[1]),snap(v[2])];}function vkey(v){return v.join(',');}
  const VEC={R:[1,0,0],L:[-1,0,0],U:[0,1,0],D:[0,-1,0],F:[0,0,1],B:[0,0,-1]};
  function genRots(){const basis=Object.values(VEC);const out=[];for(const ex of basis)for(const ey of basis){if(dot(ex,ey)!==0)continue;const ez=cross(ex,ey);if(Math.abs(ez[0])+Math.abs(ez[1])+Math.abs(ez[2])!==1)continue;const k=JSON.stringify([ex,ey,ez]);if(!out.some(r=>JSON.stringify(r)===k))out.push([ex,ey,ez]);}return out;}
  const ROTS=genRots();
  function applyRot(v,rot){const[ex,ey,ez]=rot;const[x,y,z]=v;return[x*ex[0]+y*ey[0]+z*ez[0],x*ex[1]+y*ey[1]+z*ez[1],x*ex[2]+y*ey[2]+z*ez[2]];}
  function solved(){const centers=[{id:'U',pos:[0,1,0],color:'U'},{id:'D',pos:[0,-1,0],color:'D'},{id:'F',pos:[0,0,1],color:'F'},{id:'B',pos:[0,0,-1],color:'B'},{id:'R',pos:[1,0,0],color:'R'},{id:'L',pos:[-1,0,0],color:'L'}];const corners=[];for(const x of[-1,1])for(const y of[-1,1])for(const z of[-1,1]){corners.push({pos:[x,y,z],stickers:[{color:x===1?'R':'L',normal:[x,0,0]},{color:y===1?'U':'D',normal:[0,y,0]},{color:z===1?'F':'B',normal:[0,0,z]}]});}return{centers,corners};}
  function restore(state){const ref=state.corners.find(c=>c.stickers.some(s=>s.color==='U')&&c.stickers.some(s=>s.color==='F')&&c.stickers.some(s=>s.color==='R'));const nU=ref.stickers.find(s=>s.color==='U').normal;const nF=ref.stickers.find(s=>s.color==='F').normal;const nR=ref.stickers.find(s=>s.color==='R').normal;const chosen=ROTS.find(rot=>vkey(applyRot(nU,rot))===vkey(VEC.U)&&vkey(applyRot(nF,rot))===vkey(VEC.F)&&vkey(applyRot(nR,rot))===vkey(VEC.R));if(!chosen)throw new Error('Orientation error');for(const cn of state.centers)cn.pos=applyRot(cn.pos,chosen);for(const co of state.corners){co.pos=applyRot(co.pos,chosen);for(const s of co.stickers)s.normal=applyRot(s.normal,chosen);}}
  const SPECS={R:{axis:[-1,1,1],dir:-1},L:{axis:[-1,-1,1],dir:-1},U:{axis:[1,-1,1],dir:-1},B:{axis:[1,1,1],dir:-1}};
  function applyMove(state,tok){const m=tok.match(/^([RLUB])('?)$/);if(!m)throw new Error('Unsupported move: '+tok);const sp=SPECS[m[1]];const ang=(m[2]?-sp.dir:sp.dir)*(2*Math.PI/3);for(const cn of state.centers)if(dot(cn.pos,sp.axis)>0)cn.pos=snapV(rotAround(cn.pos,sp.axis,ang));for(const co of state.corners){if(dot(co.pos,sp.axis)>0){co.pos=snapV(rotAround(co.pos,sp.axis,ang));for(const s of co.stickers)s.normal=snapV(rotAround(s.normal,sp.axis,ang));}}restore(state);}
  const state=solved();const toks=text.trim().replace(/[''`’]/g,"'").split(/\s+/).filter(Boolean);for(const tok of toks)applyMove(state,tok);
  const TOP=[0,1,0];const center=state.centers.find(cn=>vkey(cn.pos)===vkey(TOP)).color;function getCorner(pos){const co=state.corners.find(c=>vkey(c.pos)===vkey(pos));return co.stickers.find(s=>vkey(s.normal)===vkey(TOP)).color;}
  return{center,TL:getCorner([-1,1,-1]),TR:getCorner([1,1,-1]),BL:getCorner([-1,1,1]),BR:getCorner([1,1,1])};
}
function renderSkewb(scramble){
  let fd,err='';try{fd=skewbSolve(scramble||'');}catch(e){err=e.message;fd={center:'U',TL:'U',TR:'U',BL:'U',BR:'U'};}
  function inset(pts,r){const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length,cy=pts.reduce((s,p)=>s+p[1],0)/pts.length;return pts.map(([x,y])=>[cx+(x-cx)*r,cy+(y-cy)*r]);}
  function rPath(pts,rad){const n=pts.length,tI=[],tO=[];for(let i=0;i<n;i++){const prev=pts[(i-1+n)%n],curr=pts[i],next=pts[(i+1)%n];const v1=[prev[0]-curr[0],prev[1]-curr[1]],v2=[next[0]-curr[0],next[1]-curr[1]];const l1=Math.hypot(v1[0],v1[1]),l2=Math.hypot(v2[0],v2[1]);const u1=[v1[0]/l1,v1[1]/l1],u2=[v2[0]/l2,v2[1]/l2];const cosT=Math.max(-1,Math.min(1,u1[0]*u2[0]+u1[1]*u2[1]));let t=rad/Math.tan(Math.acos(cosT)/2);t=Math.min(t,l1*.35,l2*.35);tI.push([curr[0]+u1[0]*t,curr[1]+u1[1]*t]);tO.push([curr[0]+u2[0]*t,curr[1]+u2[1]*t]);}const p=[`M ${tO[0][0]} ${tO[0][1]}`];for(let i=1;i<n;i++){p.push(`L ${tI[i][0]} ${tI[i][1]}`);p.push(`Q ${pts[i][0]} ${pts[i][1]} ${tO[i][0]} ${tO[i][1]}`);}p.push(`L ${tI[0][0]} ${tI[0][1]}`);p.push(`Q ${pts[0][0]} ${pts[0][1]} ${tO[0][0]} ${tO[0][1]}`);p.push('Z');return p.join(' ');}
  const ns='http://www.w3.org/2000/svg';const svg=document.createElementNS(ns,'svg');svg.setAttribute('viewBox','0 0 300 300');const skW=IS_EMBED?130:280;if(IS_EMBED){svg.setAttribute('width','100%');svg.setAttribute('height','100%');}else{svg.setAttribute('width',skW);svg.setAttribute('height',skW);}
  const bg=document.createElementNS(ns,'rect');bg.setAttribute('x','24');bg.setAttribute('y','24');bg.setAttribute('width','252');bg.setAttribute('height','252');bg.setAttribute('rx','18');bg.setAttribute('fill','#18181b');svg.appendChild(bg);
  const tM=[150,24],rM=[276,150],bM=[150,276],lM=[24,150];
  const regions=[[[24,24],tM,lM],[[[276,24],rM,tM]],[[[24,276],lM,bM]],[[[276,276],bM,rM]],[[tM,rM,bM,lM]]];
  const faceData=[fd.TL,fd.TR,fd.BL,fd.BR,fd.center];
  const rawRegions=[[[24,24],tM,lM],[[[276,24],rM,tM]],[[[24,276],lM,bM]],[[[276,276],bM,rM]]];
  // Re-do cleanly:
  const regionList=[{pts:[[24,24],tM,lM],col:fd.TL},{pts:[[276,24],rM,tM],col:fd.TR},{pts:[[24,276],lM,bM],col:fd.BL},{pts:[[276,276],bM,rM],col:fd.BR},{pts:[tM,rM,bM,lM],col:fd.center}];
  for(const{pts,col}of regionList){const inner=inset(pts,0.88);const path=document.createElementNS(ns,'path');path.setAttribute('d',rPath(inner,6.2));path.setAttribute('fill',COLORS[col]);path.setAttribute('stroke','rgba(0,0,0,.10)');path.setAttribute('stroke-width','0.7');svg.appendChild(path);}
  const viz=document.getElementById('vizContainer');viz.innerHTML='';if(err){const d=document.createElement('div');d.className='err-msg';d.textContent=err;viz.appendChild(d);}viz.appendChild(svg);
  document.getElementById('legendContainer').innerHTML=`<div class="legend-grid">${['U','D','F','B','R','L'].map(f=>`<div class="legend-item"><span class="swatch" style="background:${COLORS[f]}"></span><span>${COLOR_NAMES[f]}</span></div>`).join('')}</div>`;}

// ── PYRAMINX ──────────────────────────────────────────────────────────────────
function renderPyraminx(scramble){
  const V={U:[1,1,1],L:[1,-1,-1],R:[-1,1,-1],B:[-1,-1,1]};
  const pyC={F:'#009b48',L:'#b71234',R:'#0046ad',D:'#ffd500'};
  const pyN={F:'Front / Green',L:'Left / Red',R:'Right / Blue',D:'Bottom / Yellow'};
  const faceDefs=[{name:'F',verts:['U','L','R'],color:'F'},{name:'L',verts:['U','B','L'],color:'L'},{name:'R',verts:['U','R','B'],color:'R'},{name:'D',verts:['L','B','R'],color:'D'}];
  const U2=[150,18],L2=[20,245],R2=[280,245];
  function vadd(a,b){return[a[0]+b[0],a[1]+b[1],a[2]+b[2]];}function vsc(a,s){return[a[0]*s,a[1]*s,a[2]*s];}function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}function cross(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}function normalize(a){const n=Math.sqrt(dot(a,a));return[a[0]/n,a[1]/n,a[2]/n];}function rotAround(pt,axis,ang){const u=normalize(axis),cos=Math.cos(ang),sin=Math.sin(ang);return vadd(vadd(vsc(pt,cos),vsc(cross(u,pt),sin)),vsc(u,dot(u,pt)*(1-cos)));}
  function triCenter(t){return[(t[0][0]+t[1][0]+t[2][0])/3,(t[0][1]+t[1][1]+t[2][1])/3,(t[0][2]+t[1][2]+t[2][2])/3];}
  function faceNormal(f){const A=V[f.verts[0]],B=V[f.verts[1]],C=V[f.verts[2]];let n=normalize(cross([B[0]-A[0],B[1]-A[1],B[2]-A[2]],[C[0]-A[0],C[1]-A[1],C[2]-A[2]]));const c=triCenter([A,B,C]);return dot(n,c)<0?vsc(n,-1):n;}
  function bary(pt,vn){return(dot(pt,V[vn])+1)/4;}
  function interp3(A,B,C,wa,wb,wc){return[A[0]*wa+B[0]*wb+C[0]*wc,A[1]*wa+B[1]*wb+C[1]*wc,A[2]*wa+B[2]*wb+C[2]*wc];}
  function genFL(f){const out=[],A=V[f.verts[0]],B=V[f.verts[1]],C=V[f.verts[2]],n=3,nm=faceNormal(f);for(let i=0;i<n;i++)for(let j=0;j<n-i;j++){const p1=interp3(A,B,C,(n-i-j)/n,i/n,j/n),p2=interp3(A,B,C,(n-i-j-1)/n,(i+1)/n,j/n),p3=interp3(A,B,C,(n-i-j-1)/n,i/n,(j+1)/n);out.push({color:f.color,tri:[p1,p2,p3],normal:nm});if(i+j<n-1){const q1=interp3(A,B,C,(n-i-j-1)/n,(i+1)/n,j/n),q2=interp3(A,B,C,(n-i-j-2)/n,(i+1)/n,(j+1)/n),q3=interp3(A,B,C,(n-i-j-1)/n,i/n,(j+1)/n);out.push({color:f.color,tri:[q1,q2,q3],normal:nm});}}return out;}
  function solvedPyra(){const fl=[];faceDefs.forEach(f=>genFL(f).forEach(x=>fl.push(x)));return fl;}
  function applyMove(facelets,tok){const m=tok.match(/^([ULRBulrb])('?)$/);if(!m)throw new Error('Unsupported move: '+tok);const raw=m[1],isTip=raw===raw.toLowerCase(),vertex=raw.toUpperCase(),isPrime=tok.endsWith("'");const thr=isTip?(2/3+1e-9):(1/3+1e-9);const ang=(isPrime?1:-1)*(2*Math.PI/3);const axis=V[vertex];for(const fl of facelets){const cen=triCenter(fl.tri);if(bary(cen,vertex)>thr){fl.tri=fl.tri.map(p=>rotAround(p,axis,ang));fl.normal=rotAround(fl.normal,axis,ang);}}}
  const facelets=solvedPyra();let err='';
  if(scramble){const toks=scramble.trim().replace(/[''`’]/g,"'").split(/\s+/).filter(Boolean);try{for(const tok of toks)applyMove(facelets,tok);}catch(e){err=e.message;}}
  const FNORM=faceNormal(faceDefs[0]);
  function proj(pt){const wu=bary(pt,'U'),wl=bary(pt,'L'),wr=bary(pt,'R');return[U2[0]*wu+L2[0]*wl+R2[0]*wr,U2[1]*wu+L2[1]*wl+R2[1]*wr];}
  const front=facelets.filter(fl=>dot(fl.normal,FNORM)>0.999);
  function insetTri(pts,r){const cx=(pts[0][0]+pts[1][0]+pts[2][0])/3,cy=(pts[0][1]+pts[1][1]+pts[2][1])/3;return pts.map(([x,y])=>[cx+(x-cx)*r,cy+(y-cy)*r]);}
  function triPath(pts){const[A,B,C]=pts,p=[A,B,C],tI=[],tO=[],rad=5.8;for(let i=0;i<3;i++){const prev=p[(i+2)%3],curr=p[i],next=p[(i+1)%3];const v1=[prev[0]-curr[0],prev[1]-curr[1]],v2=[next[0]-curr[0],next[1]-curr[1]];const l1=Math.hypot(v1[0],v1[1]),l2=Math.hypot(v2[0],v2[1]);const u1=[v1[0]/l1,v1[1]/l1],u2=[v2[0]/l2,v2[1]/l2];const cosT=Math.max(-1,Math.min(1,u1[0]*u2[0]+u1[1]*u2[1]));let t=rad/Math.tan(Math.acos(cosT)/2);t=Math.min(t,l1*.35,l2*.35);tI.push([curr[0]+u1[0]*t,curr[1]+u1[1]*t]);tO.push([curr[0]+u2[0]*t,curr[1]+u2[1]*t]);}return[`M ${tO[0][0]} ${tO[0][1]}`,`L ${tI[1][0]} ${tI[1][1]}`,`Q ${p[1][0]} ${p[1][1]} ${tO[1][0]} ${tO[1][1]}`,`L ${tI[2][0]} ${tI[2][1]}`,`Q ${p[2][0]} ${p[2][1]} ${tO[2][0]} ${tO[2][1]}`,`L ${tI[0][0]} ${tI[0][1]}`,`Q ${p[0][0]} ${p[0][1]} ${tO[0][0]} ${tO[0][1]}`,'Z'].join(' ');}
  const ns='http://www.w3.org/2000/svg';const svg=document.createElementNS(ns,'svg');svg.setAttribute('viewBox','0 0 300 270');const pyW=IS_EMBED?130:300,pyH=IS_EMBED?117:270;if(IS_EMBED){svg.setAttribute('width','100%');svg.setAttribute('height','100%');}else{svg.setAttribute('width',pyW);svg.setAttribute('height',pyH);}
  const border=document.createElementNS(ns,'polygon');border.setAttribute('points',`${U2[0]},${U2[1]} ${L2[0]},${L2[1]} ${R2[0]},${R2[1]}`);border.setAttribute('fill','#18181b');svg.appendChild(border);
  for(const fl of front){const pts2d=fl.tri.map(proj),inner=insetTri(pts2d,0.905);const path=document.createElementNS(ns,'path');path.setAttribute('d',triPath(inner));path.setAttribute('fill',pyC[fl.color]);path.setAttribute('stroke','rgba(0,0,0,.12)');path.setAttribute('stroke-width','0.8');path.setAttribute('stroke-linejoin','round');svg.appendChild(path);}
  const viz=document.getElementById('vizContainer');viz.innerHTML='';if(err){const d=document.createElement('div');d.className='err-msg';d.textContent=err;viz.appendChild(d);}viz.appendChild(svg);
  document.getElementById('legendContainer').innerHTML=`<div class="legend-grid" style="grid-template-columns:repeat(2,1fr);max-width:280px">${['F','L','R','D'].map(f=>`<div class="legend-item"><span class="swatch" style="background:${pyC[f]}"></span><span>${pyN[f]}</span></div>`).join('')}</div>`;}

// ── CLOCK ──────────────────────────────────────────────────────────────────
function renderClock(scramble){
  const FB={UR:[1,2,4,5],DR:[4,5,7,8],DL:[3,4,6,7],UL:[0,1,3,4],U:[0,1,2,3,4,5],R:[1,2,4,5,7,8],D:[3,4,5,6,7,8],L:[0,1,3,4,6,7],ALL:[0,1,2,3,4,5,6,7,8]};
  const BB={UR:[0],DR:[6],DL:[8],UL:[2],U:[0,2],R:[0,6],D:[6,8],L:[2,8],ALL:[0,2,6,8]};
  function norm12(n){let x=n%12;if(x<0)x+=12;return x;}
  const st={black:new Array(9).fill(0),white:new Array(9).fill(0)};let bof=true,err='';
  if(scramble){const toks=scramble.trim().split(/\s+/).filter(Boolean);for(const tok of toks){if(tok==='y2'){bof=!bof;continue;}const m=tok.match(/^(UR|DR|DL|UL|U|R|D|L|ALL)(\d+)([+-])$/);if(!m){err='Unsupported token: '+tok;break;}const amount=parseInt(m[2],10),sign=m[3]==='+'?1:-1;const fa=norm12(amount*sign),ba=norm12(-amount*sign);if(bof){FB[m[1]].forEach(i=>st.black[i]=norm12(st.black[i]+fa));BB[m[1]]&&BB[m[1]].forEach(i=>st.white[i]=norm12(st.white[i]+ba));}else{FB[m[1]].forEach(i=>st.white[i]=norm12(st.white[i]+fa));BB[m[1]]&&BB[m[1]].forEach(i=>st.black[i]=norm12(st.black[i]+ba));}}}
  const ns='http://www.w3.org/2000/svg';const svg=document.createElementNS(ns,'svg');svg.setAttribute('viewBox','0 0 520 520');const clW=IS_EMBED?140:400;if(IS_EMBED){svg.setAttribute('width','100%');svg.setAttribute('height','100%');}else{svg.setAttribute('width',clW);svg.setAttribute('height',clW);}
  function mel(tag,attrs){const el=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);return el;}
  svg.appendChild(mel('circle',{cx:260,cy:260,r:252,fill:'#101011'}));svg.appendChild(mel('circle',{cx:260,cy:260,r:226,fill:'#141416',stroke:'#232327','stroke-width':1.5}));
  for(let row=0;row<3;row++)for(let col=0;col<3;col++){const cx=110+col*150,cy=110+row*150,r=50,val=st.black[row*3+col];svg.appendChild(mel('circle',{cx,cy,r:r+16,fill:'#0b0b0c'}));svg.appendChild(mel('circle',{cx,cy,r:r+10,fill:'#111112'}));svg.appendChild(mel('circle',{cx,cy,r,fill:'#ffffff',stroke:'#d4d4d8','stroke-width':2}));for(let h=0;h<12;h++){const ang=(h*30-90)*Math.PI/180;svg.appendChild(mel('line',{x1:cx+Math.cos(ang)*(r+5),y1:cy+Math.sin(ang)*(r+5),x2:cx+Math.cos(ang)*(r+9),y2:cy+Math.sin(ang)*(r+9),stroke:h%3===0?'#f5f5f5':'#a1a1aa','stroke-width':h%3===0?2.5:1.5,'stroke-linecap':'round'}));}const topY=cy-r-11;svg.appendChild(mel('line',{x1:cx,y1:topY-6,x2:cx,y2:topY+5,stroke:'#dc2626','stroke-width':3,'stroke-linecap':'round'}));const ha=(val*30-90)*Math.PI/180;svg.appendChild(mel('line',{x1:cx,y1:cy,x2:cx+Math.cos(ha)*(r-16),y2:cy+Math.sin(ha)*(r-16),stroke:'#111827','stroke-width':5,'stroke-linecap':'round'}));svg.appendChild(mel('circle',{cx,cy,r:7,fill:'#111112'}));svg.appendChild(mel('circle',{cx,cy,r:3,fill:'#ffffff'}));}
  [[185,185],[335,185],[185,335],[335,335]].forEach(([cx,cy])=>svg.appendChild(mel('circle',{cx,cy,r:16,fill:'#f8f8f8',stroke:'#111112','stroke-width':5})));
  const viz=document.getElementById('vizContainer');viz.innerHTML='';if(err){const d=document.createElement('div');d.className='err-msg';d.textContent=err;viz.appendChild(d);}viz.appendChild(svg);document.getElementById('legendContainer').innerHTML='';}

// ── EVENTS & UI ──────────────────────────────────────────────────────────────
const EVENTS=[
  {id:'222',label:'2×2',group:'nxn'},{id:'333',label:'3×3',group:'nxn'},{id:'444',label:'4×4',group:'nxn'},
  {id:'555',label:'5×5',group:'nxn'},{id:'666',label:'6×6',group:'nxn'},{id:'777',label:'7×7',group:'nxn'},
  {id:'333oh',label:'3×3 OH',group:'nxn',cubeKey:'333'},{id:'333bf',label:'3×3 BLD',group:'nxn',cubeKey:'333'},
  {id:'444bf',label:'4×4 BLD',group:'nxn',cubeKey:'444'},{id:'555bf',label:'5×5 BLD',group:'nxn',cubeKey:'555'},
  {id:'clock',label:'Clock',group:'other'},{id:'pyram',label:'Pyraminx',group:'other'},{id:'skewb',label:'Skewb',group:'other'},
  {id:'minx',label:'Megaminx',group:'other',noFile:true},{id:'sq1',label:'Square-1',group:'other',noFile:true},
  {id:'fto',label:'FTO',group:'unofficial',unofficial:true},{id:'baby_fto',label:'Baby FTO',group:'unofficial',unofficial:true},
];
const SAMPLES={'222':"R U R' F2 U' F",'333':"R U R' F2 U' R2 F R",'444':"Rw2 B2 U2 Lw U2 Rw' U2 Rw U2 F2 Rw F2 Lw' B2 Rw2",'555':"Rw U2 Lw' F2 Rw' F2 Lw U2 Rw' U2 Rw U2 F2 Rw F2",'666':"3Rw2 Fw2 U2 3Lw U2 3Rw' U2 3Rw U2 Fw2 3Rw Fw2",'777':"3Rw2 Fw2 U2 3Lw U2 3Rw' U2 3Rw U2 Fw2 3Rw Fw2",clock:"UR3+ DR6+ DL5+ UL1- U4+ R2- D5+ L1+ ALL6+ y2 U2+ R3- D1+ L2+ ALL4-",pyram:"U L R B u l r b",skewb:"R U B' L R'"};

let activeId='333';

function buildTabs(){
  const rows={nxn:'tabsNxN',other:'tabsOther',unofficial:'tabsUnofficial'};
  for(const ev of EVENTS){const btn=document.createElement('button');btn.className='tab-btn'+(ev.unofficial?' unofficial':'')+(ev.id===activeId?' active':'');btn.textContent=ev.label;btn.dataset.id=ev.id;btn.addEventListener('click',()=>selectEvent(ev.id));document.getElementById(rows[ev.group]).appendChild(btn);}
}

function selectEvent(id){
  activeId=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  const ev=EVENTS.find(e=>e.id===id);
  const showInput=ev&&!ev.unofficial&&!ev.noFile;
  document.getElementById('inputCard').style.display=showInput?'':'none';
  const ta=document.getElementById('scrambleInput');
  const ck=ev.cubeKey||ev.id;
  if(!ta.value.trim()&&SAMPLES[ck])ta.value=SAMPLES[ck];
  drawActive();
}

function drawActive(){
  const ev=EVENTS.find(e=>e.id===activeId);
  const viz=document.getElementById('vizContainer');
  const leg=document.getElementById('legendContainer');
  if(ev.unofficial){viz.innerHTML=`<div class="placeholder"><div class="ph-icon">🔶</div><div class="ph-title">No draw scramble yet</div><div class="ph-badge">Unofficial event</div><div class="ph-sub">Draw scrambles for ${ev.label} aren't available yet.</div></div>`;leg.innerHTML='';return;}
  if(ev.noFile){viz.innerHTML=`<div class="placeholder"><div class="ph-icon">🔧</div><div class="ph-title">No draw scramble yet</div><div class="ph-sub">A draw scramble viewer for ${ev.label} is coming soon.</div></div>`;leg.innerHTML='';return;}
  const scramble=document.getElementById('scrambleInput').value;
  const ck=ev.cubeKey||ev.id;
  if(NXN_CFG[ck]){renderNxN(scramble,ck);return;}
  if(ev.id==='skewb'){renderSkewb(scramble);return;}
  if(ev.id==='pyram'){renderPyraminx(scramble);return;}
  if(ev.id==='clock'){renderClock(scramble);return;}
}

document.getElementById('drawBtn').addEventListener('click',drawActive);
document.getElementById('scrambleInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();drawActive();}});

(function(){const p=new URLSearchParams(location.search);const ev=p.get('event'),sc=p.get('scramble');if(ev&&EVENTS.find(e=>e.id===ev))activeId=ev;if(sc)document.getElementById('scrambleInput').value=sc;})();

buildTabs();
selectEvent(activeId);
</script></body></html>
