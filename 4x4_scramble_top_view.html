<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2x2 Top Face Scramble Viewer</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #ffffff;
      --text: #18181b;
      --muted: #71717a;
      --border: #d4d4d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 17px;
      font-family: Consolas, Monaco, monospace;
      outline: none;
    }

    textarea:focus {
      border-color: #27272a;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0 22px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #18181b;
      color: white;
    }

    .secondary {
      background: #e4e4e7;
      color: #18181b;
    }

    .output-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: center;
      justify-items: center;
      border-top: 1px solid var(--border);
      padding-top: 22px;
    }

    .cube-label {
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }

    .top-face {
      width: 300px;
      height: 300px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      background: #18181b;
      border: 8px solid #18181b;
      border-radius: 16px;
    }

    .sticker {
      border-radius: 8px;
      border: 2px solid rgba(0, 0, 0, 0.18);
    }

    .legend {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,.25);
      flex: 0 0 auto;
    }

    .error {
      color: #b91c1c;
      font-weight: 700;
      min-height: 20px;
      margin-top: 8px;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>4x4 Top Face Viewer</h1>
    <p>Paste a standard 4x4 scramble and this will show what the top face looks like after the scramble.</p>

    <label for="scramble">Scramble</label>
    <textarea id="scramble" spellcheck="false">R U R' F2 U' R2 F R</textarea>

    <div class="buttons">
      <button class="primary" id="showBtn">Show Top Face</button>
      <button class="secondary" id="resetBtn">Reset</button>
      <button class="secondary" id="sampleBtn">Load Sample</button>
    </div>

    <div id="error" class="error"></div>

    <section class="output-wrap">
      <div>
        <div class="cube-label">Top / U Face</div>
        <div class="top-face" id="topFace" aria-label="Top face of scrambled 4x4 cube"></div>
      </div>

      <div class="legend" id="legend"></div>
    </section>

    <div class="note">
      Supported moves: U, D, R, L, F, B and common wide moves like Rw, Uw, Fw, r, u, f, each with optional 2 or ' suffix. Rotations and parentheses are not included.
    </div>
  </main>

  <script>
    const N = 4;
    const coords = [-1.5, -0.5, 0.5, 1.5];

    const colors = {
      U: "#ffffff", // white
      D: "#ffd500", // yellow
      F: "#009b48", // green
      B: "#0046ad", // blue
      R: "#b71234", // red
      L: "#ff5800"  // orange
    };

    const colorNames = {
      U: "White / U",
      D: "Yellow / D",
      F: "Green / F",
      B: "Blue / B",
      R: "Red / R",
      L: "Orange / L"
    };

    // Coordinate system:
    // x = left/right, y = down/up, z = back/front.
    // For a 4x4, coordinates are -1.5, -0.5, 0.5, 1.5.
    // A visible cubie stores its current position and the outward normal of each sticker.
    function solvedCube() {
      const cubies = [];

      for (const x of coords) {
        for (const y of coords) {
          for (const z of coords) {
            const isInternal = Math.abs(x) !== 1.5 && Math.abs(y) !== 1.5 && Math.abs(z) !== 1.5;
            if (isInternal) continue;

            const stickers = [];

            if (y === 1.5) stickers.push({ color: "U", normal: [0, 1, 0] });
            if (y === -1.5) stickers.push({ color: "D", normal: [0, -1, 0] });
            if (z === 1.5) stickers.push({ color: "F", normal: [0, 0, 1] });
            if (z === -1.5) stickers.push({ color: "B", normal: [0, 0, -1] });
            if (x === 1.5) stickers.push({ color: "R", normal: [1, 0, 0] });
            if (x === -1.5) stickers.push({ color: "L", normal: [-1, 0, 0] });

            cubies.push({ pos: [x, y, z], stickers });
          }
        }
      }

      return cubies;
    }

    function rotateVector(vector, axis, quarterTurns) {
      let result = vector.slice();
      const turns = ((quarterTurns % 4) + 4) % 4;

      for (let i = 0; i < turns; i++) {
        const x = result[0];
        const y = result[1];
        const z = result[2];

        if (axis === "x") result = [x, -z, y];
        if (axis === "y") result = [z, y, -x];
        if (axis === "z") result = [-y, x, z];
      }

      return result;
    }

    // Standard face turns: clockwise when looking directly at that face.
    const moveInfo = {
      U: { axis: "y", layers: [1.5], turns: -1 },
      D: { axis: "y", layers: [-1.5], turns: 1 },
      R: { axis: "x", layers: [1.5], turns: -1 },
      L: { axis: "x", layers: [-1.5], turns: 1 },
      F: { axis: "z", layers: [1.5], turns: -1 },
      B: { axis: "z", layers: [-1.5], turns: 1 }
    };

    // Common 4x4 wide moves. Rw means R plus the inner slice next to R.
    const wideMoveInfo = {
      Uw: { axis: "y", layers: [1.5, 0.5], turns: -1 },
      Dw: { axis: "y", layers: [-1.5, -0.5], turns: 1 },
      Rw: { axis: "x", layers: [1.5, 0.5], turns: -1 },
      Lw: { axis: "x", layers: [-1.5, -0.5], turns: 1 },
      Fw: { axis: "z", layers: [1.5, 0.5], turns: -1 },
      Bw: { axis: "z", layers: [-1.5, -0.5], turns: 1 },
      u: { axis: "y", layers: [1.5, 0.5], turns: -1 },
      d: { axis: "y", layers: [-1.5, -0.5], turns: 1 },
      r: { axis: "x", layers: [1.5, 0.5], turns: -1 },
      l: { axis: "x", layers: [-1.5, -0.5], turns: 1 },
      f: { axis: "z", layers: [1.5, 0.5], turns: -1 },
      b: { axis: "z", layers: [-1.5, -0.5], turns: 1 }
    };

    function parseToken(token) {
      let base = token;
      let suffix = "";

      if (base.endsWith("2") || base.endsWith("'")) {
        suffix = base.slice(-1);
        base = base.slice(0, -1);
      }

      const info = moveInfo[base] || wideMoveInfo[base];
      if (!info || !["", "2", "'"].includes(suffix)) {
        throw new Error(`Unsupported move: ${token}`);
      }

      return { info, suffix };
    }

    function applyMove(cube, token) {
      const parsed = parseToken(token);
      const info = parsed.info;
      const suffix = parsed.suffix;
      const axisIndex = { x: 0, y: 1, z: 2 }[info.axis];
      const multiplier = suffix === "2" ? 2 : suffix === "'" ? -1 : 1;
      const turns = info.turns * multiplier;

      cube.forEach(cubie => {
        if (info.layers.includes(cubie.pos[axisIndex])) {
          cubie.pos = rotateVector(cubie.pos, info.axis, turns);
          cubie.stickers.forEach(sticker => {
            sticker.normal = rotateVector(sticker.normal, info.axis, turns);
          });
        }
      });
    }

    function parseScramble(text) {
      return text
        .trim()
        .replaceAll("’", "'")
        .replaceAll("`", "'")
        .replaceAll(String.fromCharCode(10), " ")
        .split(" ")
        .filter(Boolean);
    }

    function applyScramble(text) {
      const cube = solvedCube();
      parseScramble(text).forEach(token => applyMove(cube, token));
      return cube;
    }

    function getTopFaceStickers(cube) {
      const topPositions = [];

      // Render back row first, front row last, so green/front appears at the bottom.
      for (const z of [-1.5, -0.5, 0.5, 1.5]) {
        for (const x of [-1.5, -0.5, 0.5, 1.5]) {
          topPositions.push([x, 1.5, z]);
        }
      }

      return topPositions.map(pos => {
        const cubie = cube.find(c => c.pos.join(",") === pos.join(","));
        const sticker = cubie.stickers.find(s => s.normal.join(",") === "0,1,0");
        return sticker.color;
      });
    }

    function renderTopFace(cube) {
      const top = document.getElementById("topFace");
      top.innerHTML = "";

      getTopFaceStickers(cube).forEach(sticker => {
        const square = document.createElement("div");
        square.className = "sticker";
        square.style.background = colors[sticker];
        square.title = colorNames[sticker];
        top.appendChild(square);
      });
    }

    function renderLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = "";

      ["U", "D", "F", "B", "R", "L"].forEach(face => {
        const item = document.createElement("div");
        item.className = "legend-item";

        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = colors[face];

        const text = document.createElement("span");
        text.textContent = colorNames[face];

        item.appendChild(swatch);
        item.appendChild(text);
        legend.appendChild(item);
      });
    }

    function showTopFace() {
      const scramble = document.getElementById("scramble").value;
      const error = document.getElementById("error");
      error.textContent = "";

      try {
        renderTopFace(applyScramble(scramble));
      } catch (err) {
        error.textContent = err.message;
      }
    }

    document.getElementById("showBtn").addEventListener("click", showTopFace);

    document.getElementById("resetBtn").addEventListener("click", () => {
      document.getElementById("scramble").value = "";
      document.getElementById("error").textContent = "";
      renderTopFace(solvedCube());
    });

    document.getElementById("sampleBtn").addEventListener("click", () => {
      document.getElementById("scramble").value = "Rw U Rw' F2 Uw' R2 Fw R";
      showTopFace();
    });

    renderLegend();
    showTopFace();
  </script>
</body>
</html>
